version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: foodie_moodie_db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: foodie_moodie
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - foodie_net

  mongo_express:
    image: mongo-express:1.0.2
    container_name: foodie_moodie_admin
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASS:-secret}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASS:-admin123}
    ports:
      - "8081:8081"
    networks:
      - foodie_net

volumes:
  mongo_data:

networks:
  foodie_net:
    driver: bridge